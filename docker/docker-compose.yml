# filename: docker/docker-compose.yml
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/backend/data
      - UPLOAD_DIR=/app/backend/data/uploads
      - DB_PATH=/app/backend/data/montera.db
    volumes:
      # hot-reload backend code
      - ../backend:/app/backend
      # persist sqlite + uploads
      - ../backend/data:/app/backend/data
      # your GROQ key lives here (project root .env)
      - ../.env:/app/.env:ro
    command: python -m uvicorn main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    ports:
      - "3000:3000"
    environment:
      # CRA in Docker must bind to 0.0.0.0
      - HOST=0.0.0.0
      - PORT=3000

      # Windows file watching fixes
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

      # IMPORTANT: This must be reachable from YOUR BROWSER
      # (not container DNS). Since backend is published on host:8000, use localhost.
      - REACT_APP_API_BASE_URL=http://localhost:8000
    volumes:
      - ../frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "npm install && npm start"
    depends_on:
      - backend

volumes:
  frontend_node_modules: